<!DOCTYPE html>
<html>
<head>
<title>Favicon List</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #000;
        color: #fff;
    }

    header {
        padding: 20px;
        font-size: 22px;
        font-weight: bold;
        border-bottom: 1px solid #222;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 12px;
        padding: 15px;
    }

    .item {
        background: #000;
        border: 1px solid #111;
        padding: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
        overflow: hidden;
    }

    .item img {
        width: 80px;
        height: 80px;
        object-fit: contain;
        flex-shrink: 0;
    }

    .text {
        font-size: 13px;
        word-break: break-all;
        color: #ddd;
    }
</style>
</head>
<body>

<header>Custom and Userrequested Favicon list</header>

<div class="container" id="list"></div>

<script>
async function loadData() {
    try {
        const res = await fetch("./api/faviconlist.json");
        const data = await res.json();

        const container = document.getElementById("list");

        Object.entries(data).forEach(([name, img]) => {
            const div = document.createElement("div");
            div.className = "item";

            div.innerHTML = `
                <img src="${img}" alt="icon">
                <div class="text">${name}</div>
            `;

            container.appendChild(div);
        });

    } catch (err) {
        document.getElementById("list").innerHTML =
            "<div style='padding:20px;color:red;'>didn't load</div>";
    }
}

loadData();
</script>

</body>
</html>
